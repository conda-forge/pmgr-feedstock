{% set name = "pmgr" %}
{% set version = "2.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/pcdshub/pmgr/archive/R{{ version }}.tar.gz
  sha256: 08afc2c14d6a96bb9c079b0927f6ae79a7ae8c6585d669c10e28cd5772833c26

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - pmgrLauncher.sh = pmgr.pmgr:main
    - pmgrUtils.sh = pmgr.pmgrUtils:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools_scm
    - pip
  run:
    - python >={{ python_min }}
    - pyqt >=5
    - pyca >=3.2.0
    - pykerberos >=1.1.14
    - mysqlclient =1.3.12|>=2.0.3
    # >9.0.0 removes native auth, breaking prod database access
    - mysql-libs <9.0.0
    - docopt
    - pcdsutils

test:
  requires:
    - python {{ python_min }}
  imports:
    - pmgr
    - pmgr.pmgrUtils
  commands:
    - QT_QPA_PLATFORM="offscreen" pmgrLauncher.sh --help
    - QT_QPA_PLATFORM="offscreen" pmgrUtils.sh --help

about:
  home: https://github.com/pcdshub/pmgr
  dev_url: https://github.com/pcdshub/pmgr
  license: LicenseRef-BSD-3-Clause-SLAC
  license_family: BSD
  license_file: LICENSE.md
  summary: LCLS Device Configuration Parameter Manager

extra:
  recipe-maintainers:
    - conda-forge/pcdsdevices
